server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/projectdemo}
    username: ${SPRING_DATASOURCE_USERNAME:demo}
    password: ${SPRING_DATASOURCE_PASSWORD:demo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: notification
  flyway:
    enabled: true
    schemas: notification
    default-schema: notification
    create-schemas: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:demo}
    password: ${SPRING_RABBITMQ_PASSWORD:demo}

demobasic:
  rabbit:
    queue: project.events.q
  registry:
    base-url: ${REGISTRY_BASE_URL:http://localhost:8081}
  firebase:
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    enabled: ${FCM_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
