server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: integration-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/projectdemo}
    username: ${SPRING_DATASOURCE_USERNAME:demo}
    password: ${SPRING_DATASOURCE_PASSWORD:demo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: integration
  flyway:
    enabled: true
    schemas: integration
    default-schema: integration
    create-schemas: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:demo}
    password: ${SPRING_RABBITMQ_PASSWORD:demo}

demobasic:
  rabbit:
    exchange: project.events
    queue: project.events.q
  jira:
    base-url: ${JIRA_BASE_URL:}
    email: ${JIRA_USER_EMAIL:}
    api-token: ${JIRA_API_TOKEN:}
    project-key: ${JIRA_PROJECT_KEY:}
    max-results: 10
  github:
    token: ${GITHUB_TOKEN:}
    owner: ${GITHUB_OWNER:}
    repo: ${GITHUB_REPO:}
    branch: ${GITHUB_BRANCH:}
    per-page: 5
  scheduler:
    enabled: ${SYNC_SCHEDULER_ENABLED:false}
    interval-ms: ${SYNC_INTERVAL_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
